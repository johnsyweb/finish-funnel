version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - '*'
        update-types:
          - major
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps):'
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      all-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(ci):'
